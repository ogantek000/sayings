<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote of the Day</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

canvas#mountain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
canvas#clouds{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}

.center{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px}

.quote-wrap{max-width:820px;width:100%;text-align:center;
  opacity:0;animation:reveal 2.5s cubic-bezier(0.16,1,0.3,1) 0.8s forwards}
@keyframes reveal{to{opacity:1}}

.label{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:0.5em;
  text-transform:uppercase;color:rgba(255,240,200,0.8);margin-bottom:28px;
  text-shadow:0 0 20px rgba(255,200,100,0.6)}

.quote-text{
  font-family:'Cinzel',serif;
  font-size:clamp(20px,3.6vw,50px);
  font-weight:700;
  line-height:1.4;
  letter-spacing:0.04em;
  background:linear-gradient(160deg,
    #fff9f0 0%,
    #ffe8a0 20%,
    #ffffff 40%,
    #ffd080 55%,
    #ffefcc 70%,
    #ffffff 85%,
    #ffe090 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 9s ease infinite;
  filter:drop-shadow(0 0 40px rgba(255,210,100,0.5)) drop-shadow(0 2px 8px rgba(0,0,0,0.8));
}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.divider{width:80px;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,220,120,0.9),transparent);
  margin:28px auto;box-shadow:0 0 12px rgba(255,200,80,0.5)}



.date-line{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:0.3em;
  color:rgba(255,220,150,0.4);z-index:11}
</style>
</head>
<body>
<canvas id="mountain"></canvas>
<canvas id="clouds"></canvas>
<canvas id="particles"></canvas>

<div class="center">
  <div class="quote-wrap">
    <div class="label">Quote of the Day</div>
    <p class="quote-text" id="qt"></p>
    <div class="divider"></div>
  </div>
</div>
<div class="date-line" id="dl"></div>

<script>
const QUOTES=[
  {text:"There is a lot of ugly in the world, but sure as hell there is a lot of beauty",author:"— Unknown"},
  {text:"Don't take life too seriously. You'll never get out of it alive",author:"— Elbert Hubbard"},
  {text:"Early to rise and early to bed makes a man healthy, but socially dead",author:"— Unknown"},
  {text:"Yesterday is history, tomorrow is mystery, today is a gift — that's why it's called the present",author:"— Unknown"},
  {text:"Don't try to be nonchalant. Why hide the joy of life God gave us?",author:"— Unknown"},
  {text:"Don't worry about next week. Focus on the next 24 hours",author:"— Unknown"},
  {text:"It ain't all good, but it ain't all bad either — so be thankful, be happy",author:"— Unknown"},
  {text:"A foolish man asks for an easier road. A wise man asks for stronger legs",author:"— Unknown"},
  {text:"The less you care, the more you live",author:"— Unknown"},
  {text:"You can't add days to your life, but you can add life to your days",author:"— Unknown"},
  {text:"Make two people proud: the 8-year-old you, and the 80-year-old you",author:"— Unknown"},
  {text:"Not every lion that chased a deer caught it — but every lion that caught one, chased it",author:"— Unknown"},
  {text:"Don't care about others. You are not in competition",author:"— Unknown"},
  {text:"Do you want to be on your deathbed knowing you could have — but didn't?",author:"— Unknown"},
  {text:"Hate is too heavy to hold. Let it go",author:"— Unknown"},
  {text:"A negative mind will never give you a positive life",author:"— Unknown"},
  {text:"A winner is a loser who tried once more",author:"— Unknown"},
  {text:"You start to enjoy life when you no longer fear death",author:"— Unknown"},
  {text:"Not trying is a failure",author:"— Unknown"}
];
function getIdx(){const d=new Date();const day=Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);return(d.getFullYear()*1000+day)%QUOTES.length}
const q=QUOTES[getIdx()];
document.getElementById('qt').textContent=q.text;

const now=new Date();
document.getElementById('dl').textContent=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();

// ─── MOUNTAIN CANVAS ───────────────────────────────────────────────────
const mc=document.getElementById('mountain'),mx=mc.getContext('2d');
const cc=document.getElementById('clouds'),cx=cc.getContext('2d');
const pc=document.getElementById('particles'),px=pc.getContext('2d');

function resize(){
  mc.width=cc.width=pc.width=window.innerWidth;
  mc.height=cc.height=pc.height=window.innerHeight;
  buildScene();
}

// Seeded random for stable scene
function seededRand(seed){let s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646}}

let W,H,horizonY,snowLine,treeLine;
let ridges=[];
let pines=[];
let cloudList=[];
let birds=[];

function buildScene(){
  W=mc.width; H=mc.height;
  horizonY=H*0.52;
  snowLine=H*0.38;
  treeLine=H*0.58;
  const r=seededRand(42);
  ridges=[];

  // 5 mountain ridges from back to front
  const configs=[
    {col0:'#b8d4f5',col1:'#8ab4e8',col2:'#d6eaff',snowA:0.95,count:6,hMin:0.22,hMax:0.42,jagged:0.7},
    {col0:'#7aa8d8',col1:'#5580b8',col2:'#a8ccf0',snowA:0.88,count:7,hMin:0.28,hMax:0.52,jagged:0.9},
    {col0:'#4a7ab0',col1:'#2d5a90',col2:'#80aadc',snowA:0.80,count:6,hMin:0.30,hMax:0.56,jagged:1.1},
    {col0:'#2c5888',col1:'#1a3d6a',col2:'#5080b0',snowA:0.70,count:5,hMin:0.32,hMax:0.60,jagged:1.3},
    {col0:'#1a3a5c',col1:'#0d2540',col2:'#2e5070',snowA:0.0,count:4,hMin:0.40,hMax:0.62,jagged:1.5},
  ];
  for(let ci=0;ci<configs.length;ci++){
    const cfg=configs[ci];
    const pts=[];
    const n=cfg.count;
    for(let i=0;i<=n;i++){
      const bx=W*(i/n);
      const peakH=cfg.hMin+(cfg.hMax-cfg.hMin)*r();
      const peakX=bx+W*(r()*0.12-0.06)*(ci+1);
      pts.push({x:peakX,y:H*(1-peakH)});
    }
    // jagged sub-points
    const full=[];
    full.push({x:-10,y:H});
    for(let i=0;i<pts.length;i++){
      if(i>0){
        const prev=pts[i-1],cur=pts[i];
        const mid=(prev.x+cur.x)/2;
        const jag=(r()-0.5)*W*0.04*cfg.jagged;
        const midY=Math.min(prev.y,cur.y)+(Math.abs(prev.y-cur.y)*0.3)+jag;
        full.push({x:mid,y:midY});
      }
      full.push(pts[i]);
    }
    full.push({x:W+10,y:H});
    ridges.push({pts:full,...cfg,z:ci});
  }

  // Pine trees on lower slopes
  pines=[];
  const tr=seededRand(99);
  for(let i=0;i<90;i++){
    const x=tr()*W;
    const baseY=treeLine+tr()*(H*0.12);
    const h=30+tr()*50;
    const layer=Math.floor(tr()*3);
    pines.push({x,y:baseY,h,layer,sway:tr()*Math.PI*2,swaySpeed:tr()*0.003+0.001});
  }

  // Clouds
  cloudList=[];
  const cr=seededRand(77);
  for(let i=0;i<18;i++){
    cloudList.push({
      x:cr()*W*2-W*0.5,
      y:H*(0.04+cr()*0.28),
      w:120+cr()*300,
      h:30+cr()*70,
      speed:0.08+cr()*0.18,
      alpha:0.3+cr()*0.5,
      puffs:Math.floor(cr()*4)+3
    });
  }

  // Birds
  birds=[];
  for(let i=0;i<12;i++){
    birds.push({
      x:Math.random()*W,y:H*(0.08+Math.random()*0.2),
      vx:0.3+Math.random()*0.6,vy:0,
      wingT:Math.random()*Math.PI*2,size:1.5+Math.random()*2
    });
  }
}

function drawSky(t){
  const w=W,h=H;
  // Animated dawn/dusk sky with rich colors
  const phase=(Math.sin(t*0.0002)*0.5+0.5); // 0..1 slow cycle
  // Sky gradient — golden hour feel always
  const sky=mx.createLinearGradient(0,0,0,horizonY);
  // Deep blue-violet zenith
  sky.addColorStop(0,`hsl(${220+phase*20},${55+phase*20}%,${18+phase*8}%)`);
  sky.addColorStop(0.3,`hsl(${200+phase*30},${60}%,${28+phase*10}%)`);
  // Golden/orange horizon
  sky.addColorStop(0.72,`hsl(${28+phase*10},${85}%,${55+phase*10}%)`);
  sky.addColorStop(0.88,`hsl(${18+phase*8},${90}%,${65+phase*5}%)`);
  sky.addColorStop(1,`hsl(${35+phase*15},${80}%,${72}%)`);
  mx.fillStyle=sky;
  mx.fillRect(0,0,w,horizonY+2);

  // Sun glow on horizon
  const sunX=W*0.62+Math.sin(t*0.0001)*W*0.1;
  const sunY=horizonY*0.85+Math.sin(t*0.00015)*horizonY*0.05;
  for(let r=200;r>0;r-=5){
    const a=0.006*(200-r)/200;
    mx.fillStyle=`rgba(255,${180+r/2},${80+r},${a})`;
    mx.beginPath();mx.arc(sunX,sunY,r,0,Math.PI*2);mx.fill();
  }
  // Sun disc
  mx.fillStyle='rgba(255,240,180,0.95)';
  mx.beginPath();mx.arc(sunX,sunY,18,0,Math.PI*2);mx.fill();
  mx.fillStyle='rgba(255,255,220,1)';
  mx.beginPath();mx.arc(sunX,sunY,10,0,Math.PI*2);mx.fill();

  // Stars (faint)
  mx.fillStyle='rgba(255,255,255,0.4)';
  const sr=seededRand(12);
  for(let i=0;i<60;i++){
    const sx=sr()*w,sy=sr()*horizonY*0.6;
    const sa=Math.abs(Math.sin(t*0.002+i))*0.5;
    mx.globalAlpha=sa*0.5;
    mx.beginPath();mx.arc(sx,sy,0.8,0,Math.PI*2);mx.fill();
  }
  mx.globalAlpha=1;
}

function drawRidge(ridge,t){
  const pts=ridge.pts;
  mx.beginPath();
  mx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length-1;i++){
    const cp=(pts[i].x+pts[i+1].x)/2;
    const cy2=(pts[i].y+pts[i+1].y)/2;
    mx.quadraticCurveTo(pts[i].x,pts[i].y,cp,cy2);
  }
  mx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
  mx.lineTo(W+20,H+10);mx.lineTo(-10,H+10);mx.closePath();

  const grad=mx.createLinearGradient(0,H*0.1,0,H);
  grad.addColorStop(0,ridge.col2);
  grad.addColorStop(0.3,ridge.col0);
  grad.addColorStop(0.7,ridge.col1);
  grad.addColorStop(1,'rgba(0,0,0,0.95)');
  mx.fillStyle=grad;
  mx.fill();

  // Snow caps
  if(ridge.snowA>0.3){
    mx.save();
    mx.globalAlpha=ridge.snowA;
    mx.beginPath();
    mx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length-1;i++){
      const cp=(pts[i].x+pts[i+1].x)/2;
      const cy2=(pts[i].y+pts[i+1].y)/2;
      mx.quadraticCurveTo(pts[i].x,pts[i].y,cp,cy2);
    }
    mx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
    for(let i=pts.length-1;i>=0;i--){
      const offsetY=Math.min(pts[i].y+H*0.06, snowLine+H*0.06);
      mx.lineTo(pts[i].x, offsetY);
    }
    mx.closePath();
    const snowGrad=mx.createLinearGradient(0,0,0,snowLine+H*0.05);
    snowGrad.addColorStop(0,'rgba(255,255,255,0.98)');
    snowGrad.addColorStop(0.6,'rgba(220,235,255,0.8)');
    snowGrad.addColorStop(1,'rgba(180,210,240,0)');
    mx.fillStyle=snowGrad;
    mx.fill();
    mx.restore();
  }
}

function drawForest(t){
  const layerCols=[
    ['#0d2a18','#1a4028'],
    ['#0a2015','#163320'],
    ['#081a12','#12281a']
  ];
  for(let layer=2;layer>=0;layer--){
    for(const p of pines){
      if(p.layer!==layer)continue;
      const sway=Math.sin(t*0.001*p.swaySpeed*300+p.sway)*2;
      const x=p.x,y=p.y,h=p.h;
      const col=layerCols[layer];
      mx.save();
      mx.translate(x,y);mx.rotate(sway*0.012);
      const tiers=3;
      for(let ti=0;ti<tiers;ti++){
        const ty=-h*(ti/tiers+0.2);
        const tw=h*(0.5-ti*0.12)*(1-ti*0.05);
        const tg=mx.createLinearGradient(-tw,ty-h*0.25,tw,ty);
        tg.addColorStop(0,col[0]);tg.addColorStop(1,col[1]);
        mx.fillStyle=tg;
        mx.beginPath();mx.moveTo(0,ty-h*0.28);mx.lineTo(tw,ty);mx.lineTo(-tw,ty);mx.closePath();mx.fill();
      }
      mx.restore();
    }
  }
}

function drawGround(){
  // Valley floor
  const gg=mx.createLinearGradient(0,treeLine,0,H);
  gg.addColorStop(0,'#1a3d25');
  gg.addColorStop(0.2,'#142e1c');
  gg.addColorStop(0.5,'#0e2016');
  gg.addColorStop(1,'#050d09');
  mx.fillStyle=gg;
  mx.fillRect(0,treeLine,W,H-treeLine);

  // Meadow gradient strip
  const mg=mx.createLinearGradient(0,treeLine,0,treeLine+H*0.08);
  mg.addColorStop(0,'rgba(60,130,60,0.4)');
  mg.addColorStop(1,'transparent');
  mx.fillStyle=mg;
  mx.fillRect(0,treeLine,W,H*0.08);

  // River / lake shimmer
  const ry=treeLine+H*0.14;
  const rh=H*0.025;
  const rg=mx.createLinearGradient(W*0.1,ry,W*0.9,ry);
  rg.addColorStop(0,'rgba(100,180,255,0)');
  rg.addColorStop(0.3,'rgba(140,200,255,0.45)');
  rg.addColorStop(0.5,'rgba(180,220,255,0.55)');
  rg.addColorStop(0.7,'rgba(140,200,255,0.45)');
  rg.addColorStop(1,'rgba(100,180,255,0)');
  mx.fillStyle=rg;
  mx.beginPath();mx.ellipse(W/2,ry,W*0.38,rh,0,0,Math.PI*2);mx.fill();
}

function drawClouds(t){
  cx.clearRect(0,0,W,H);
  for(const cl of cloudList){
    cl.x+=cl.speed;
    if(cl.x>W+cl.w*0.5)cl.x=-cl.w*0.5;
    cx.save();cx.globalAlpha=cl.alpha;
    for(let pi=0;pi<cl.puffs;pi++){
      const px2=cl.x+pi*(cl.w/(cl.puffs-1||1))-cl.w/2;
      const py2=cl.y+Math.sin(pi*1.3)*cl.h*0.3;
      const pr=cl.h*(0.5+Math.sin(pi*0.8)*0.3);
      const cg=cx.createRadialGradient(px2,py2,0,px2,py2,pr);
      cg.addColorStop(0,'rgba(255,245,225,0.9)');
      cg.addColorStop(0.4,'rgba(255,235,200,0.6)');
      cg.addColorStop(1,'rgba(220,200,180,0)');
      cx.fillStyle=cg;
      cx.beginPath();cx.arc(px2,py2,pr,0,Math.PI*2);cx.fill();
    }
    cx.restore();
  }
}

function drawBirds(t){
  for(const b of birds){
    b.x+=b.vx;b.wingT+=0.08;
    if(b.x>W+50)b.x=-50;
    const wing=Math.sin(b.wingT)*b.size*3;
    px.save();px.translate(b.x,b.y+Math.sin(b.wingT*0.3)*3);
    px.strokeStyle='rgba(30,20,10,0.7)';px.lineWidth=1.2;
    px.beginPath();px.moveTo(-b.size*3,wing);px.quadraticCurveTo(-b.size,0,0,0);
    px.moveTo(0,0);px.quadraticCurveTo(b.size,0,b.size*3,wing);
    px.stroke();px.restore();
  }
}

// Floating golden dust particles
const dustP=[];
for(let i=0;i<120;i++){
  dustP.push({x:Math.random()*2000,y:Math.random()*600,vx:(Math.random()-0.3)*0.3,vy:-(Math.random()*0.15+0.03),a:Math.random()*0.6+0.1,r:Math.random()*1.5+0.3,hue:30+Math.random()*40});
}
function drawDust(t){
  px.clearRect(0,0,W,H);
  drawBirds(t);
  for(const d of dustP){
    d.x+=d.vx+Math.sin(t*0.001+d.y)*0.1;
    d.y+=d.vy;
    if(d.y<0)d.y=H*0.9;
    if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    const pulse=0.5+0.5*Math.sin(t*0.005+d.x);
    px.beginPath();
    const dg=px.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r*3);
    dg.addColorStop(0,`hsla(${d.hue},95%,85%,${d.a*pulse})`);
    dg.addColorStop(1,'transparent');
    px.fillStyle=dg;
    px.arc(d.x,d.y,d.r*3,0,Math.PI*2);px.fill();
  }

  // Lens flare streaks from sun
  const sunX=W*0.62;const sunY=horizonY*0.85;
  px.save();px.globalAlpha=0.04+0.02*Math.sin(t*0.003);
  for(let i=0;i<6;i++){
    const len=W*(0.3+i*0.15);const ang=(i/6)*Math.PI*2;
    px.strokeStyle=`hsl(${40+i*10},100%,90%)`;px.lineWidth=1.5-i*0.2;
    px.beginPath();px.moveTo(sunX,sunY);
    px.lineTo(sunX+Math.cos(ang)*len,sunY+Math.sin(ang)*len);px.stroke();
  }
  px.restore();
}

// Atmospheric fog/mist between ridges
function drawMist(t){
  for(let i=0;i<4;i++){
    const my2=horizonY*0.7+i*H*0.05+Math.sin(t*0.0005+i)*10;
    const mg=mx.createLinearGradient(0,my2-20,0,my2+30);
    mg.addColorStop(0,'transparent');
    mg.addColorStop(0.4,`rgba(200,220,255,${0.06-i*0.01})`);
    mg.addColorStop(1,'transparent');
    mx.fillStyle=mg;
    mx.fillRect(0,my2-20,W,50);
  }
}

let frame=0;
function loop(){
  frame++;
  mx.clearRect(0,0,W,H);
  drawSky(frame);
  // Back to front ridges
  for(let i=0;i<ridges.length;i++) drawRidge(ridges[i],frame);
  drawMist(frame);
  drawForest(frame);
  drawGround();
  drawClouds(frame);
  drawDust(frame);
  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize',()=>{resize();});
loop();
</script>
</body>
</html>
